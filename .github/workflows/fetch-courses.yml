name: Fetch Course Data

on:
  schedule:
    # Runs on the Monday within each date range (day-of-week = 1 = Monday)
    # Second week of January (semester XXXX10)
    - cron: '0 6 8-14 1 1'
    # First week of June (semester XXXX19 - intersemestral)
    - cron: '0 6 1-7 6 1'
    # Last week of July (semester XXXX20)
    - cron: '0 6 25-31 7 1'

  workflow_dispatch:
    inputs:
      term:
        description: 'Academic term (YYYYMM format, e.g., 202610)'
        required: false
        type: string

jobs:
  fetch-courses:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Determine academic term
        id: term
        run: |
          if [ -n "${{ github.event.inputs.term }}" ]; then
            echo "term=${{ github.event.inputs.term }}" >> $GITHUB_OUTPUT
          else
            YEAR=$(date +%Y)
            MONTH=$(date +%m)
            if [ "$MONTH" -le 5 ]; then
              TERM="${YEAR}10"
            elif [ "$MONTH" -le 7 ]; then
              TERM="${YEAR}19"
            else
              TERM="${YEAR}20"
            fi
            echo "term=$TERM" >> $GITHUB_OUTPUT
          fi

      - name: Fetch course data
        run: python scripts/fetch-courses.py ${{ steps.term.outputs.term }}

      - name: Analyze enums
        run: python scripts/analyze-enums.py

      - name: Validate fetched data
        run: |
          TERM="${{ steps.term.outputs.term }}"
          FILE="data/courses/courses-${TERM}.json"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: Expected file $FILE not found"
            exit 1
          fi
          MANIFEST_TERM=$(python3 -c "import json; print(json.load(open('data/courses/manifest.json'))['term'])")
          if [ "$MANIFEST_TERM" != "$TERM" ]; then
            echo "ERROR: Manifest term $MANIFEST_TERM does not match expected $TERM"
            exit 1
          fi
          SECTIONS=$(python3 -c "import json; print(json.load(open('data/courses/manifest.json'))['totalSections'])")
          echo "Validated: $SECTIONS sections for term $TERM"

      - name: Check for changes
        id: changes
        run: git diff --quiet data/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git commit -m "Update course data for term ${{ steps.term.outputs.term }}"
          git push

      - name: Create summary
        run: |
          echo "### Course Data Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Term:** ${{ steps.term.outputs.term }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✓ Complete" >> $GITHUB_STEP_SUMMARY
          if [ -f data/courses/manifest.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/courses/manifest.json >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
