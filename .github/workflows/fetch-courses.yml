name: Fetch Course Data

on:
  # Run on semester key dates
  schedule:
    # Beginning of semester 1 (January): 1st and 15th
    - cron: '0 2 1 1 *'
    - cron: '0 2 15 1 *'
    # Beginning of semester 2 (July): 1st and 15th
    - cron: '0 2 1 7 *'
    - cron: '0 2 15 7 *'
    # Mid-semester updates (March, September): 1st
    - cron: '0 2 1 3 *'
    - cron: '0 2 1 9 *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      term:
        description: 'Academic term (YYYYMM format, e.g., 202610)'
        required: false
        type: string

jobs:
  fetch-courses:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any required dependencies here
          # pip install -r scripts/requirements.txt
      
      - name: Determine academic term
        id: term
        run: |
          if [ -n "${{ github.event.inputs.term }}" ]; then
            echo "term=${{ github.event.inputs.term }}" >> $GITHUB_OUTPUT
          else
            # Calculate current term based on date
            YEAR=$(date +%Y)
            MONTH=$(date +%m)
            if [ $MONTH -le 6 ]; then
              TERM="${YEAR}10"
            else
              TERM="${YEAR}20"
            fi
            echo "term=$TERM" >> $GITHUB_OUTPUT
          fi
      
      - name: Fetch course data
        run: |
          python scripts/fetch-courses.py ${{ steps.term.outputs.term }}
      
      - name: Analyze enums
        run: |
          python scripts/analyze-enums.py
      
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git commit -m "Update course data for term ${{ steps.term.outputs.term }}"
          git push
      
      - name: Create summary
        run: |
          echo "### Course Data Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Term:** ${{ steps.term.outputs.term }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✓ Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/courses/manifest.json ]; then
            echo "**Manifest:**" >> $GITHUB_STEP_SUMMARY
            cat data/courses/manifest.json >> $GITHUB_STEP_SUMMARY
          fi
